<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SportsAnalytics Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%3C/text%3E%3C/svg%3E">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Date-fns -->
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.29.3/index.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        dark: '#0f172a',
                        'dark-card': '#1e293b'
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .dark .glass {
            background: rgba(30, 41, 59, 0.7);
        }
        
        /* Smooth transitions */
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
        
        /* Mobile optimizations */
        @media (max-width: 640px) {
            .responsive-grid {
                grid-template-columns: 1fr !important;
            }
        }
        
        /* PWA install prompt */
        #install-prompt {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #3b82f6;
            color: white;
            padding: 12px 24px;
            border-radius: 9999px;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
            z-index: 50;
            cursor: pointer;
            font-weight: 600;
            animation: slideUp 0.3s ease-out;
        }
        
        @keyframes slideUp {
            from { transform: translate(-50%, 100px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-dark text-gray-900 dark:text-gray-100 transition-colors duration-200">
    <div id="root"></div>
    <div id="install-prompt" onclick="installApp()">📱 Install SportsAnalytics Pro</div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, 
            ResponsiveContainer, LineChart, Line, AreaChart, Area, PieChart, Pie, Cell,
            ScatterChart, Scatter, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, Radar
        } = Recharts;
        const { format, subDays, addDays } = dateFns;
        
        // Icon components (Lucide wrapper)
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = React.useRef(null);
            
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const icon = window.lucide.createElement(window.lucide.icons[name]);
                    if (icon) {
                        icon.setAttribute('width', size);
                        icon.setAttribute('height', size);
                        iconRef.current.appendChild(icon);
                    }
                }
            }, [name, size]);
            
            return <span ref={iconRef} className={className} style={{ display: 'inline-flex' }}></span>;
        };

        // Mock Data Generators
        const generateId = () => Math.random().toString(36).substr(2, 9);
        
        const generateMatch = (id) => {
            const teams = [
                ['Manchester City', 'Liverpool'],
                ['Real Madrid', 'Barcelona'],
                ['Bayern Munich', 'Dortmund'],
                ['PSG', 'Marseille'],
                ['Juventus', 'AC Milan'],
                ['Chelsea', 'Arsenal'],
                ['Man United', 'Tottenham'],
                ['Inter Milan', 'Napoli']
            ];
            const [home, away] = teams[id % teams.length];
            
            const homeExp = 1.8 + Math.random();
            const awayExp = 1.2 + Math.random();
            
            // Poisson calculation
            const scorelines = [];
            let homeWin = 0, draw = 0, awayWin = 0;
            for (let h = 0; h <= 5; h++) {
                for (let a = 0; a <= 5; a++) {
                    const prob = (Math.pow(homeExp, h) * Math.exp(-homeExp) / factorial(h)) * 
                                 (Math.pow(awayExp, a) * Math.exp(-awayExp) / factorial(a));
                    scorelines.push({ score: `${h}-${a}`, prob });
                    if (h > a) homeWin += prob;
                    else if (h === a) draw += prob;
                    else awayWin += prob;
                }
            }
            scorelines.sort((a, b) => b.prob - a.prob);
            
            return {
                id: id.toString(),
                homeTeam: home,
                awayTeam: away,
                league: ['Premier League', 'La Liga', 'Bundesliga', 'Serie A'][id % 4],
                date: format(addDays(new Date(), id), 'yyyy-MM-dd'),
                time: '15:00',
                status: 'scheduled',
                score: null,
                odds: {
                    bookmakers: [
                        { bookmaker: 'Bet365', homeWin: 2.1, draw: 3.4, awayWin: 3.2, over25: 1.8, bttsYes: 1.9, liquidity: 'high' },
                        { bookmaker: 'Pinnacle', homeWin: 2.15, draw: 3.35, awayWin: 3.1, over25: 1.85, bttsYes: 1.88, liquidity: 'high' },
                        { bookmaker: 'Betfair', homeWin: 2.05, draw: 3.5, awayWin: 3.3, over25: 1.75, bttsYes: 1.95, liquidity: 'medium' },
                        { bookmaker: '1xBet', homeWin: 2.2, draw: 3.3, awayWin: 3.0, over25: 1.9, bttsYes: 1.85, liquidity: 'medium' }
                    ]
                },
                predictions: {
                    poisson: {
                        homeGoals: homeExp.toFixed(2),
                        awayGoals: awayExp.toFixed(2),
                        homeWinProb: (homeWin * 100).toFixed(1),
                        drawProb: (draw * 100).toFixed(1),
                        awayWinProb: (awayWin * 100).toFixed(1),
                        scorelines: scorelines.slice(0, 5)
                    },
                    ensemble: {
                        weightedProb: {
                            home: homeWin * 100,
                            draw: draw * 100,
                            away: awayWin * 100
                        }
                    }
                },
                weather: {
                    temp: 18,
                    condition: ['sunny', 'cloudy', 'rainy'][Math.floor(Math.random() * 3)],
                    humidity: 65,
                    windSpeed: 12,
                    effect: 0
                },
                injuries: {
                    home: [
                        { player: 'Star Striker', type: 'injury', severity: 'moderate', impact: 25 },
                        { player: 'Key Midfielder', type: 'doubtful', severity: 'minor', impact: 15 }
                    ],
                    away: [
                        { player: 'Captain', type: 'suspension', severity: 'severe', impact: 30 }
                    ]
                },
                h2h: Array.from({ length: 5 }, (_, i) => ({
                    date: format(subDays(new Date(), (i + 1) * 180), 'yyyy-MM-dd'),
                    homeScore: Math.floor(Math.random() * 4),
                    awayScore: Math.floor(Math.random() * 3)
                })),
                lineup: {
                    home: Array.from({ length: 11 }, (_, i) => ({
                        name: `Player ${i + 1}`,
                        position: ['GK', 'DF', 'MF', 'FW'][Math.floor(i / 3)] || 'FW',
                        number: i + 1,
                        rating: (6.5 + Math.random() * 1.5).toFixed(1),
                        fitness: Math.floor(80 + Math.random() * 20)
                    })),
                    away: Array.from({ length: 11 }, (_, i) => ({
                        name: `Away Player ${i + 1}`,
                        position: ['GK', 'DF', 'MF', 'FW'][Math.floor(i / 3)] || 'FW',
                        number: i + 1,
                        rating: (6.3 + Math.random() * 1.4).toFixed(1),
                        fitness: Math.floor(75 + Math.random() * 25)
                    }))
                }
            };
        };
        
        const factorial = (n) => n <= 1 ? 1 : n * factorial(n - 1);
        
        const calculateValueBets = (match) => {
            const probs = match.predictions.ensemble.weightedProb;
            const avgOdds = {
                home: match.odds.bookmakers.reduce((a, b) => a + b.homeWin, 0) / match.odds.bookmakers.length,
                draw: match.odds.bookmakers.reduce((a, b) => a + b.draw, 0) / match.odds.bookmakers.length,
                away: match.odds.bookmakers.reduce((a, b) => a + b.awayWin, 0) / match.odds.bookmakers.length
            };
            
            const bets = [];
            const markets = [
                { key: 'home', prob: probs.home, odds: avgOdds.home, name: 'Home Win' },
                { key: 'draw', prob: probs.draw, odds: avgOdds.draw, name: 'Draw' },
                { key: 'away', prob: probs.away, odds: avgOdds.away, name: 'Away Win' }
            ];
            
            markets.forEach(m => {
                const implied = 100 / m.odds;
                const edge = (m.prob - implied) / implied;
                if (edge > 0.02) {
                    const kelly = ((m.prob / 100 * m.odds - 1) / (m.odds - 1)) * 0.25;
                    bets.push({
                        market: '1X2',
                        selection: m.name,
                        odds: m.odds,
                        prob: m.prob,
                        edge: (edge * 100).toFixed(1),
                        kelly: (Math.max(0, kelly) * 100).toFixed(2),
                        rating: edge > 0.15 ? 'A' : edge > 0.08 ? 'B' : 'C'
                    });
                }
            });
            return bets.sort((a, b) => parseFloat(b.edge) - parseFloat(a.edge));
        };

        // Main App Component
        const App = () => {
            const [darkMode, setDarkMode] = useState(() => {
                if (localStorage.getItem('darkMode')) return localStorage.getItem('darkMode') === 'true';
                return window.matchMedia('(prefers-color-scheme: dark)').matches;
            });
            const [matches, setMatches] = useState([]);
            const [selectedMatch, setSelectedMatch] = useState(null);
            const [activeTab, setActiveTab] = useState('overview');
            const [bankroll, setBankroll] = useState(() => {
                const saved = localStorage.getItem('bankroll');
                return saved ? JSON.parse(saved) : {
                    current: 10000,
                    starting: 10000,
                    totalBets: 0,
                    kellyFraction: 0.25,
                    maxStake: 500
                };
            });
            const [bets, setBets] = useState(() => {
                const saved = localStorage.getItem('bets');
                return saved ? JSON.parse(saved) : [];
            });
            const [notifications, setNotifications] = useState([]);
            const [isOnline, setIsOnline] = useState(navigator.onLine);

            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('darkMode', darkMode);
            }, [darkMode]);

            useEffect(() => {
                localStorage.setItem('bankroll', JSON.stringify(bankroll));
                localStorage.setItem('bets', JSON.stringify(bets));
            }, [bankroll, bets]);

            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            useEffect(() => {
                const initialMatches = Array.from({ length: 8 }, (_, i) => generateMatch(i));
                setMatches(initialMatches);
                setSelectedMatch(initialMatches[0]);
            }, []);

            const addNotification = (msg) => {
                setNotifications(prev => [msg, ...prev].slice(0, 3));
                setTimeout(() => setNotifications(prev => prev.slice(1)), 3000);
            };

            const placeBet = (bet, match) => {
                const stake = Math.min(bankroll.current * (parseFloat(bet.kelly) / 100), bankroll.maxStake);
                if (stake <= 0) return;
                
                const newBet = {
                    id: generateId(),
                    match: `${match.homeTeam} vs ${match.awayTeam}`,
                    selection: bet.selection,
                    odds: bet.odds,
                    stake: stake.toFixed(2),
                    status: 'pending',
                    date: new Date().toISOString()
                };
                
                setBets(prev => [newBet, ...prev]);
                setBankroll(prev => ({ ...prev, current: prev.current - stake, totalBets: prev.totalBets + 1 }));
                addNotification(`Bet placed: ${bet.selection} @ ${bet.odds}`);
            };

            const valueBets = selectedMatch ? calculateValueBets(selectedMatch) : [];

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <header className="sticky top-0 z-40 bg-gradient-to-r from-blue-600 to-purple-600 text-white shadow-lg">
                        <div className="px-4 py-3 flex items-center justify-between max-w-7xl mx-auto">
                            <div className="flex items-center gap-2">
                                <Icon name="Brain" size={28} />
                                <div>
                                    <h1 className="text-lg font-bold leading-tight">SportsAnalytics</h1>
                                    <p className="text-xs text-blue-100">Pro</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                {!isOnline && (
                                    <span className="bg-red-500/20 text-red-100 text-xs px-2 py-1 rounded-full flex items-center gap-1">
                                        <Icon name="WifiOff" size={12} /> Offline
                                    </span>
                                )}
                                <button onClick={() => setDarkMode(!darkMode)} className="p-2 bg-white/20 rounded-lg hover:bg-white/30 transition">
                                    <Icon name={darkMode ? "Sun" : "Moon"} size={20} />
                                </button>
                                <div className="hidden sm:block bg-white/20 px-3 py-1.5 rounded-lg text-sm font-semibold">
                                    ${bankroll.current.toLocaleString()}
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Notifications */}
                    {notifications.length > 0 && (
                        <div className="fixed top-16 left-1/2 transform -translate-x-1/2 z-50 space-y-2 w-full max-w-sm px-4">
                            {notifications.map((notif, i) => (
                                <div key={i} className="bg-green-500 text-white px-4 py-3 rounded-lg shadow-lg text-sm font-medium fade-in flex items-center gap-2">
                                    <Icon name="CheckCircle2" size={16} />
                                    {notif}
                                </div>
                            ))}
                        </div>
                    )}

                    <div className="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
                        {/* Sidebar */}
                        <div className="lg:col-span-4 xl:col-span-3 space-y-4">
                            <div className="bg-white dark:bg-dark-card rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
                                <div className="p-4 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800">
                                    <h2 className="font-semibold flex items-center gap-2 text-sm">
                                        <Icon name="Calendar" size={16} /> Matches
                                    </h2>
                                </div>
                                <div className="max-h-[60vh] overflow-y-auto">
                                    {matches.map(match => (
                                        <button
                                            key={match.id}
                                            onClick={() => { setSelectedMatch(match); window.scrollTo(0, 0); }}
                                            className={`w-full p-4 text-left border-b border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors ${
                                                selectedMatch?.id === match.id ? 'bg-blue-50 dark:bg-blue-900/20 border-l-4 border-l-blue-500' : ''
                                            }`}
                                        >
                                            <div className="flex justify-between items-center mb-1">
                                                <span className="text-xs text-gray-500">{match.date}</span>
                                                <span className="text-xs bg-gray-100 dark:bg-gray-700 px-2 py-0.5 rounded">{match.league}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-sm font-medium">
                                                <span>{match.homeTeam}</span>
                                                <span className="text-gray-400 text-xs">vs</span>
                                                <span>{match.awayTeam}</span>
                                            </div>
                                            {calculateValueBets(match).length > 0 && (
                                                <div className="mt-2 flex gap-1">
                                                    {calculateValueBets(match).slice(0, 2).map((vb, i) => (
                                                        <span key={i} className={`text-xs px-2 py-0.5 rounded font-bold ${
                                                            vb.rating === 'A' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'
                                                        }`}>
                                                            {vb.rating} Value
                                                        </span>
                                                    ))}
                                                </div>
                                            )}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Mobile Bankroll */}
                            <div className="sm:hidden bg-white dark:bg-dark-card rounded-xl shadow-sm p-4 border border-gray-200 dark:border-gray-700">
                                <div className="flex justify-between items-center">
                                    <span className="text-sm text-gray-500">Bankroll</span>
                                    <span className="text-xl font-bold text-blue-600">${bankroll.current.toLocaleString()}</span>
                                </div>
                            </div>
                        </div>

                        {/* Main Content */}
                        <div className="lg:col-span-8 xl:col-span-9">
                            {selectedMatch ? (
                                <div className="space-y-6 fade-in">
                                    {/* Match Header */}
                                    <div className="bg-white dark:bg-dark-card rounded-2xl shadow-lg overflow-hidden border border-gray-200 dark:border-gray-700">
                                        <div className="bg-gradient-to-r from-blue-600 to-purple-600 p-6 text-white">
                                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                                                <div>
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <span className="bg-white/20 px-3 py-1 rounded-full text-xs">{selectedMatch.league}</span>
                                                    </div>
                                                    <h2 className="text-2xl sm:text-3xl font-bold">{selectedMatch.homeTeam} vs {selectedMatch.awayTeam}</h2>
                                                </div>
                                                <div className="text-left sm:text-right">
                                                    <div className="text-3xl sm:text-4xl font-bold">{selectedMatch.date}</div>
                                                    <div className="text-blue-100">{selectedMatch.time}</div>
                                                </div>
                                            </div>
                                            
                                            <div className="grid grid-cols-3 gap-4">
                                                <div className="glass rounded-lg p-3 text-center">
                                                    <div className="text-2xl font-bold">{parseFloat(selectedMatch.predictions.ensemble.weightedProb.home).toFixed(0)}%</div>
                                                    <div className="text-xs text-blue-100">Home</div>
                                                </div>
                                                <div className="glass rounded-lg p-3 text-center">
                                                    <div className="text-2xl font-bold">{parseFloat(selectedMatch.predictions.ensemble.weightedProb.draw).toFixed(0)}%</div>
                                                    <div className="text-xs text-blue-100">Draw</div>
                                                </div>
                                                <div className="glass rounded-lg p-3 text-center">
                                                    <div className="text-2xl font-bold">{parseFloat(selectedMatch.predictions.ensemble.weightedProb.away).toFixed(0)}%</div>
                                                    <div className="text-xs text-blue-100">Away</div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Tabs */}
                                        <div className="flex overflow-x-auto border-b border-gray-200 dark:border-gray-700 scrollbar-hide">
                                            {['overview', 'odds', 'lineups', 'my-bets'].map(tab => (
                                                <button
                                                    key={tab}
                                                    onClick={() => setActiveTab(tab)}
                                                    className={`flex-1 py-4 px-6 text-sm font-medium capitalize whitespace-nowrap transition-colors ${
                                                        activeTab === tab 
                                                            ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/50 dark:bg-blue-900/10' 
                                                            : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'
                                                    }`}
                                                >
                                                    {tab.replace('-', ' ')}
                                                </button>
                                            ))}
                                        </div>

                                        {/* Tab Content */}
                                        <div className="p-6">
                                            {activeTab === 'overview' && (
                                                <div className="space-y-6">
                                                    {/* Predictions */}
                                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                        <div className="bg-gray-50 dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700">
                                                            <h3 className="font-semibold mb-3 flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                                                                <Icon name="Target" size={16} className="text-blue-500" /> Poisson Model
                                                            </h3>
                                                            <div className="space-y-2 text-sm">
                                                                <div className="flex justify-between">
                                                                    <span className="text-gray-500">xG</span>
                                                                    <span className="font-medium">{selectedMatch.predictions.poisson.homeGoals} - {selectedMatch.predictions.poisson.awayGoals}</span>
                                                                </div>
                                                                <div className="flex justify-between">
                                                                    <span className="text-gray-500">Most Likely</span>
                                                                    <span className="font-medium text-green-600">{selectedMatch.predictions.poisson.scorelines[0].score}</span>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <div className="bg-gray-50 dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700">
                                                            <h3 className="font-semibold mb-3 flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                                                                <Icon name="CloudRain" size={16} className="text-blue-500" /> Conditions
                                                            </h3>
                                                            <div className="space-y-2 text-sm">
                                                                <div className="flex justify-between">
                                                                    <span className="text-gray-500">Weather</span>
                                                                    <span className="font-medium capitalize">{selectedMatch.weather.condition}, {selectedMatch.weather.temp}°C</span>
                                                                </div>
                                                                <div className="flex justify-between">
                                                                    <span className="text-gray-500">Wind</span>
                                                                    <span className="font-medium">{selectedMatch.weather.windSpeed} km/h</span>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <div className="bg-gray-50 dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700">
                                                            <h3 className="font-semibold mb-3 flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                                                                <Icon name="Users" size={16} className="text-blue-500" /> Injuries
                                                            </h3>
                                                            <div className="space-y-1 text-sm">
                                                                <div className="text-red-600 dark:text-red-400 font-medium">
                                                                    {selectedMatch.injuries.home.length + selectedMatch.injuries.away.length} Key Absences
                                                                </div>
                                                                <div className="text-gray-500 text-xs">
                                                                    {selectedMatch.injuries.home[0]?.player} (Home), {selectedMatch.injuries.away[0]?.player} (Away)
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    {/* Value Bets */}
                                                    {valueBets.length > 0 && (
                                                        <div className="bg-gradient-to-br from-emerald-50 to-teal-50 dark:from-emerald-900/20 dark:to-teal-900/20 rounded-xl p-6 border border-emerald-200 dark:border-emerald-800">
                                                            <h3 className="font-bold text-emerald-900 dark:text-emerald-100 flex items-center gap-2 mb-4">
                                                                <Icon name="Zap" size={20} /> AI Value Bets
                                                            </h3>
                                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                                                {valueBets.map((bet, i) => (
                                                                    <div key={i} className="bg-white dark:bg-gray-800 rounded-lg p-4 shadow-sm border border-emerald-100 dark:border-emerald-800">
                                                                        <div className="flex justify-between items-start mb-2">
                                                                            <span className={`text-xs font-bold px-2 py-1 rounded text-white ${
                                                                                bet.rating === 'A' ? 'bg-emerald-500' :
                                                                                bet.rating === 'B' ? 'bg-blue-500' : 'bg-gray-500'
                                                                            }`}>
                                                                                {bet.rating} Rating
                                                                            </span>
                                                                            <span className="text-2xl font-bold text-emerald-600">{bet.odds.toFixed(2)}</span>
                                                                        </div>
                                                                        <div className="font-medium mb-1">{bet.selection}</div>
                                                                        <div className="text-xs text-gray-500 mb-3">{bet.market}</div>
                                                                        
                                                                        <div className="space-y-1 text-xs mb-3">
                                                                            <div className="flex justify-between">
                                                                                <span>Edge</span>
                                                                                <span className="font-bold text-emerald-600">+{bet.edge}%</span>
                                                                            </div>
                                                                            <div className="flex justify-between">
                                                                                <span>Kelly Stake</span>
                                                                                <span className="font-bold">{bet.kelly}%</span>
                                                                            </div>
                                                                        </div>

                                                                        <button 
                                                                            onClick={() => placeBet(bet, selectedMatch)}
                                                                            className="w-full py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2"
                                                                        >
                                                                            <Icon name="Plus" size={16} /> Place Bet
                                                                        </button>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )}

                                            {activeTab === 'odds' && (
                                                <div className="space-y-6">
                                                    <div className="overflow-x-auto">
                                                        <table className="w-full text-sm">
                                                            <thead className="bg-gray-50 dark:bg-gray-800">
                                                                <tr>
                                                                    <th className="text-left p-3 font-semibold">Bookmaker</th>
                                                                    <th className="text-center p-3 font-semibold">1</th>
                                                                    <th className="text-center p-3 font-semibold">X</th>
                                                                    <th className="text-center p-3 font-semibold">2</th>
                                                                    <th className="text-center p-3 font-semibold hidden sm:table-cell">O2.5</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody className="divide-y divide-gray-100 dark:divide-gray-700">
                                                                {selectedMatch.odds.bookmakers.map((odd, i) => (
                                                                    <tr key={i} className="hover:bg-gray-50 dark:hover:bg-gray-800/50">
                                                                        <td className="p-3 font-medium">{odd.bookmaker}</td>
                                                                        <td className="text-center p-3 font-bold text-blue-600">{odd.homeWin.toFixed(2)}</td>
                                                                        <td className="text-center p-3">{odd.draw.toFixed(2)}</td>
                                                                        <td className="text-center p-3">{odd.awayWin.toFixed(2)}</td>
                                                                        <td className="text-center p-3 hidden sm:table-cell">{odd.over25.toFixed(2)}</td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                    
                                                    {/* Chart */}
                                                    <div className="h-64 bg-gray-50 dark:bg-gray-800 rounded-xl p-4">
                                                        <h4 className="font-semibold mb-4 text-sm">Probability Distribution</h4>
                                                        <ResponsiveContainer width="100%" height="100%">
                                                            <BarChart data={selectedMatch.predictions.poisson.scorelines}>
                                                                <CartesianGrid strokeDasharray="3 3" opacity={0.3} />
                                                                <XAxis dataKey="score" tick={{ fontSize: 12 }} />
                                                                <YAxis tick={{ fontSize: 12 }} unit="%" />
                                                                <Tooltip formatter={(val) => `${(val * 100).toFixed(1)}%`} />
                                                                <Bar dataKey="prob" fill="#3b82f6" radius={[4, 4, 0, 0]} />
                                                            </BarChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                </div>
                                            )}

                                            {activeTab === 'lineups' && (
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                    <div>
                                                        <h3 className="font-bold mb-4 text-blue-600">{selectedMatch.homeTeam}</h3>
                                                        <div className="space-y-2">
                                                            {selectedMatch.lineup.home.map((player, i) => (
                                                                <div key={i} className="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded-lg">
                                                                    <div className="flex items-center gap-3">
                                                                        <span className="w-8 h-8 bg-blue-500 text-white rounded-full flex items-center justify-center text-sm font-bold">
                                                                            {player.number}
                                                                        </span>
                                                                        <div>
                                                                            <div className="font-medium text-sm">{player.name}</div>
                                                                            <div className="text-xs text-gray-500">{player.position}</div>
                                                                        </div>
                                                                    </div>
                                                                    <div className="text-right">
                                                                        <div className="font-bold text-blue-600">{player.rating}</div>
                                                                        <div className="text-xs text-gray-500">Fit: {player.fitness}%</div>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    
                                                    <div>
                                                        <h3 className="font-bold mb-4 text-red-600">{selectedMatch.awayTeam}</h3>
                                                        <div className="space-y-2">
                                                            {selectedMatch.lineup.away.map((player, i) => (
                                                                <div key={i} className="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded-lg">
                                                                    <div className="flex items-center gap-3">
                                                                        <span className="w-8 h-8 bg-red-500 text-white rounded-full flex items-center justify-center text-sm font-bold">
                                                                            {player.number}
                                                                        </span>
                                                                        <div>
                                                                            <div className="font-medium text-sm">{player.name}</div>
                                                                            <div className="text-xs text-gray-500">{player.position}</div>
                                                                        </div>
                                                                    </div>
                                                                    <div className="text-right">
                                                                        <div className="font-bold text-red-600">{player.rating}</div>
                                                                        <div className="text-xs text-gray-500">Fit: {player.fitness}%</div>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            )}

                                            {activeTab === 'my-bets' && (
                                                <div className="space-y-4">
                                                    <h3 className="font-bold text-lg mb-4">Active Bets ({bets.filter(b => b.status === 'pending').length})</h3>
                                                    {bets.length === 0 ? (
                                                        <div className="text-center py-12 text-gray-500">
                                                            <Icon name="Target" size={48} className="mx-auto mb-3 opacity-30" />
                                                            <p>No bets placed yet. Go to Overview to add value bets.</p>
                                                        </div>
                                                    ) : (
                                                        <div className="space-y-3">
                                                            {bets.map(bet => (
                                                                <div key={bet.id} className="flex items-center justify-between p-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl shadow-sm">
                                                                    <div>
                                                                        <div className="font-medium">{bet.match}</div>
                                                                        <div className="text-sm text-gray-500">{bet.selection} @ {bet.odds}</div>
                                                                        <div className="text-xs text-gray-400 mt-1">{format(new Date(bet.date), 'MMM dd, HH:mm')}</div>
                                                                    </div>
                                                                    <div className="text-right">
                                                                        <div className="font-bold text-lg">${bet.stake}</div>
                                                                        <span className="text-xs bg-amber-100 text-amber-700 px-2 py-1 rounded-full">Pending</span>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                    
                                                    <div className="mt-8 p-4 bg-gray-50 dark:bg-gray-800 rounded-xl">
                                                        <h4 className="font-semibold mb-3">Bankroll Settings</h4>
                                                        <div className="grid grid-cols-2 gap-4">
                                                            <div>
                                                                <label className="text-xs text-gray-500">Kelly %</label>
                                                                <input 
                                                                    type="number" 
                                                                    value={bankroll.kellyFraction * 100}
                                                                    onChange={(e) => setBankroll({...bankroll, kellyFraction: parseInt(e.target.value) / 100})}
                                                                    className="w-full mt-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-sm"
                                                                />
                                                            </div>
                                                            <div>
                                                                <label className="text-xs text-gray-500">Max Stake ($)</label>
                                                                <input 
                                                                    type="number" 
                                                                    value={bankroll.maxStake}
                                                                    onChange={(e) => setBankroll({...bankroll, maxStake: parseInt(e.target.value)})}
                                                                    className="w-full mt-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-sm"
                                                                />
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex items-center justify-center h-64 text-gray-500">
                                    <div className="text-center">
                                        <Icon name="Activity" size={48} className="mx-auto mb-4 opacity-30" />
                                        <p>Select a match to view analysis</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('Service Worker registered');
            }).catch(err => {
                console.log('Service Worker registration failed');
            });
        }

        // Install Prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-prompt').style.display = 'block';
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(choice => {
                    if (choice.outcome === 'accepted') {
                        document.getElementById('install-prompt').style.display = 'none';
                    }
                });
            }
        }
    </script>
</body>
</html>
